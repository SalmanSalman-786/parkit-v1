spring.application.name=backend

server.port=8080
server.address=0.0.0.0

jwt.secret=${JWT_SECRET}
admin.registration.key=${ADMIN_REGISTRATION_KEY}

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}

#spring.datasource.url=jdbc:postgresql://localhost:5432/parkingdb
spring.datasource.url=jdbc:${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

spring.jpa.open-in-view=false

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================
# Rate Limiting
# ============================

rate.limit.user.login=5
rate.limit.guard.login=5
rate.limit.admin.login=5
rate.limit.refresh=20
rate.limit.payment=30
rate.limit.admin=60

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript

logging.level.root=INFO
logging.level.com.parking.backend=INFO